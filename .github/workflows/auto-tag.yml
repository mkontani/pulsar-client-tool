name: Auto Tag and Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type from PR title
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" == \[major\]* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$PR_TITLE" == \[minor\]* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$PR_TITLE" == \[patch\]* ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.bump.outputs.type != ''
        id: version
        env:
          BUMP: ${{ steps.bump.outputs.type }}
        run: |
          # Get latest semver tag (fallback to v0.0.0)
          latest=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi

          # Parse major.minor.patch
          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "$BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Create and push tag
        if: steps.bump.outputs.type != ''
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Set up Go
        if: steps.bump.outputs.type != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        if: steps.bump.outputs.type != ''
        run: go test ./...

      - name: Build binaries
        if: steps.bump.outputs.type != ''
        env:
          VERSION: ${{ steps.version.outputs.tag }}
          LDFLAGS: -s -w -X github.com/mkontani/pulsar-client-tool/cmd.Version=${{ steps.version.outputs.tag }}
        run: |
          declare -a targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for target in "${targets[@]}"; do
            os="${target%/*}"
            arch="${target#*/}"
            output="pulsar-client-tool-${os}-${arch}"
            if [ "$os" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building ${os}/${arch}..."
            GOOS="$os" GOARCH="$arch" go build -ldflags "${LDFLAGS}" -o "dist/${output}" .
          done

      - name: Generate checksums
        if: steps.bump.outputs.type != ''
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create Release
        if: steps.bump.outputs.type != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
